<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="8">
<title>LGS Hazırlık — Yükleniyor</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .kart {
    background: white;
    border-radius: 20px;
    padding: 48px 40px;
    text-align: center;
    max-width: 400px;
    width: 90%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #1557b0, #1a73e8);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; color: white;
    margin: 0 auto 20px;
    letter-spacing: 1px;
  }
  h1 { font-size: 20px; font-weight: 600; color: #202124; margin-bottom: 8px; }
  .alt { font-size: 14px; color: #888; margin-bottom: 32px; line-height: 1.6; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e8edf2;
    border-top-color: #1a73e8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .durum { font-size: 13px; color: #1a73e8; font-weight: 500; }
  .sayac { font-size: 12px; color: #aaa; margin-top: 24px; }
  .sayac span { color: #1a73e8; font-weight: 600; }
</style>
</head>
<body>
<div class="kart">
  <div class="logo">LGS</div>
  <h1>LGS Hazırlık Platformu</h1>
  <p class="alt">Platform şu an başlatılıyor.<br>Bu işlem genellikle <strong>15–30 saniye</strong> sürer.<br>Sayfa otomatik olarak yenilenecek.</p>
  <div class="spinner"></div>
  <p class="durum">Sunucu hazırlanıyor...</p>
  <p class="sayac">Otomatik yenileme: <span id="sn">8</span> saniye</p>
</div>
<script>
  var kalan = 8;
  var el = document.getElementById('sn');
  var timer = setInterval(function() {
    kalan--;
    el.textContent = kalan;
    if (kalan <= 0) {
      clearInterval(timer);
      window.location.reload();
    }
  }, 1000);
  // Sunucu açıldıysa ana sayfaya git
  function sunucuKontrol() {
    fetch('/health').then(function(r) {
      if (r.ok) window.location.href = '/';
    }).catch(function(){});
  }
  setInterval(sunucuKontrol, 3000);
</script>
</body>
</html>
